<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vans Kenya</title>
  <link rel="stylesheet" href="prjstyles.css">
  <script src="script.js" defer></script>

  <!-- Social Preview Meta Tags -->
  <meta property="og:title" content="Vans Kenya" />
  <meta property="og:description" content="Minimal. Clean. Powerful. Explore Vans and Converse styles in Kenya." />
  <meta property="og:image" content="https://tedmathenge77.github.io/vans-kenya/images/hero-extra.jpg" />
  <meta property="og:url" content="https://tedmathenge77.github.io/vans-kenya" />
  <meta name="twitter:card" content="summary_large_image" />
</head>

<body>

<!-- HEADER -->
<header class="main-header">
  <h1>Vans Kenya</h1>
  <div class="cart-icon">🛒</div>
</header>

<!-- HERO SECTION -->
<section class="hero">
  <div class="hero-overlay">
    <h1>Cant Go Wrong With Them Vans</h1>
    <p>Minimal. Clean. Powerful.</p>
    <button onclick="order('General Inquiry')">Shop Now</button>
    <div class="hero-images">
      <img src="images/hero-extra.jpg" alt="Luxury Highlight">
      <img src="images/vans-wave.png" alt="Vans Wave Line">
    </div>
  </div>
</section>

<!-- CATEGORIES -->
<section class="categories reveal">
  <h2>Explore Styles</h2>

  <div class="card horizontal">
    <div class="media">
      <img src="images/official.jpg" alt="Official Style" class="official-img">
    </div>
    <div class="media">
      <video src="videos/official.mp4" autoplay muted loop playsinline controls></video>
    </div>
  </div>

  <div class="card horizontal">
    <div class="media">
      <video src="videos/casual.mp4" autoplay muted loop playsinline controls></video>
    </div>
    <div class="media">
      <img src="images/casual.jpg" alt="Casual Style" class="casual-img">
    </div>
  </div>

  <div class="card horizontal">
    <div class="media">
      <img src="images/sporty.jpg" alt="Sporty Style" class="sporty-img">
    </div>
    <div class="media">
      <video src="videos/sporty.mp4" autoplay muted loop playsinline controls></video>
    </div>
  </div>
</section>

<!-- SHOP -->
<section class="shop reveal">
  <h2>Best Sellers</h2>

  <div class="card product">
    <img src="images/vans.jpg" alt="Vans" class="vans-img">
    <h3>Vans Classic</h3>
    <button onclick="order('Vans Classic')">Order Now</button>
  </div>

  <div class="card product">
    <img src="images/converse.jpg" alt="Converse" class="converse-img">
    <h3>Converse All Star</h3>
    <button onclick="order('Converse All Star')">Order Now</button>
  </div>
</section>

<!-- FOOTER -->
<footer class="footer">
  <p>Follow Us</p>
  <div class="social-icons">
    <a href="https://instagram.com" target="_blank">📸</a>
    <a href="https://tiktok.com" target="_blank">🎵</a>
  </div>
  <p>&copy; 2026 Vans Kenya</p>
</footer>

<script src="script.js"></script>
</body>
</html>
